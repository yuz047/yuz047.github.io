<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500"><rect width="1100" height="500" fill="#ffffff"/><g font-family="Inter,Arial" fill="#111"><text x="70" y="75" font-size="38" font-weight="600">AI is a stack, not one model</text><text x="70" y="116" font-size="19" fill="#666">Different model families solve different financial workflow problems.</text></g><g transform="translate(70 170)"><rect width="155" height="155" rx="24" fill="#f6f6f2" stroke="#ddd"/><text x="24" y="48" font-size="22" font-family="Inter,Arial" font-weight="600">Rules</text><text x="24" y="83" font-size="15" font-family="Inter,Arial" fill="#666">deterministic</text><text x="24" y="107" font-size="15" font-family="Inter,Arial" fill="#666">policy gates</text></g><g transform="translate(245 170)"><rect width="155" height="155" rx="24" fill="#f6f6f2" stroke="#ddd"/><text x="24" y="48" font-size="22" font-family="Inter,Arial" font-weight="600">ML</text><text x="24" y="83" font-size="15" font-family="Inter,Arial" fill="#666">scores from</text><text x="24" y="107" font-size="15" font-family="Inter,Arial" fill="#666">labeled data</text></g><g transform="translate(420 170)"><rect width="155" height="155" rx="24" fill="#f6f6f2" stroke="#ddd"/><text x="24" y="48" font-size="22" font-family="Inter,Arial" font-weight="600">Deep</text><text x="24" y="83" font-size="15" font-family="Inter,Arial" fill="#666">features learned</text><text x="24" y="107" font-size="15" font-family="Inter,Arial" fill="#666">automatically</text></g><g transform="translate(595 170)"><rect width="155" height="155" rx="24" fill="#f6f6f2" stroke="#ddd"/><text x="24" y="48" font-size="22" font-family="Inter,Arial" font-weight="600">RL</text><text x="24" y="83" font-size="15" font-family="Inter,Arial" fill="#666">sequential</text><text x="24" y="107" font-size="15" font-family="Inter,Arial" fill="#666">optimization</text></g><g transform="translate(770 170)"><rect width="270" height="155" rx="24" fill="#eef4ff" stroke="#cfe0ff"/><text x="135" y="48" text-anchor="middle" font-size="22" font-family="Inter,Arial" font-weight="600" fill="#2f5f9f">Transformers / GenAI</text><text x="135" y="84" text-anchor="middle" font-size="15" font-family="Inter,Arial" fill="#4e668a">context, retrieval, drafting,</text><text x="135" y="109" text-anchor="middle" font-size="15" font-family="Inter,Arial" fill="#4e668a">summarization, copilot workflows</text></g><path d="M225 248h20M400 248h20M575 248h20M750 248h20" stroke="#999" stroke-width="2" marker-end="url(#a)"/><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/></marker></defs></svg>
