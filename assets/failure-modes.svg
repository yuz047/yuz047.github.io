<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500"><rect width="1100" height="500" fill="#fff"/><text x="70" y="80" font-size="38" font-family="Inter,Arial" font-weight="600">AI failure is usually a workflow failure</text><text x="70" y="120" font-size="19" font-family="Inter,Arial" fill="#666">The output can look professional while the system is misaligned.</text><g font-family="Inter,Arial"><circle cx="550" cy="270" r="82" fill="#eef4ff" stroke="#cfe0ff"/><text x="504" y="260" font-size="20" font-weight="600" fill="#2f5f9f">Confident</text><text x="512" y="288" font-size="20" font-weight="600" fill="#2f5f9f">error</text><g fill="#111"><rect x="96" y="205" width="210" height="82" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="124" y="238" font-size="18" font-weight="600">Mismatch</text><text x="124" y="264" font-size="14" fill="#666">wrong model for task</text><rect x="796" y="205" width="210" height="82" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="824" y="238" font-size="18" font-weight="600">Leakage</text><text x="824" y="264" font-size="14" fill="#666">data leaves bounds</text><rect x="205" y="360" width="240" height="82" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="233" y="393" font-size="18" font-weight="600">Hallucination</text><text x="233" y="419" font-size="14" fill="#666">unsupported facts</text><rect x="655" y="360" width="240" height="82" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="683" y="393" font-size="18" font-weight="600">Scale</text><text x="683" y="419" font-size="14" fill="#666">bad output repeats fast</text></g><path d="M310 247h155M635 247h155M435 382l70-55M665 382l-70-55" stroke="#9aa" stroke-width="2"/></g></svg>