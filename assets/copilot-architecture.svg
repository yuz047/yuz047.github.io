<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500"><rect width="1100" height="500" fill="#fff"/><text x="70" y="78" font-size="38" font-family="Inter,Arial" font-weight="600">Brokerage AI copilot architecture</text><text x="70" y="118" font-size="19" font-family="Inter,Arial" fill="#666">Copilot first: retrieve, draft, validate, approve, log.</text><g font-family="Inter,Arial" font-size="16"><g transform="translate(70 190)"><rect width="155" height="92" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="25" y="40" font-weight="600">Inputs</text><text x="25" y="64" fill="#666" font-size="13">alerts, data, policy</text></g><g transform="translate(255 190)"><rect width="155" height="92" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="25" y="40" font-weight="600">Retrieval</text><text x="25" y="64" fill="#666" font-size="13">approved sources</text></g><g transform="translate(440 190)"><rect width="155" height="92" rx="22" fill="#eef4ff" stroke="#cfe0ff"/><text x="25" y="40" font-weight="600" fill="#2f5f9f">LLM draft</text><text x="25" y="64" fill="#4e668a" font-size="13">summary + rationale</text></g><g transform="translate(625 190)"><rect width="155" height="92" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="25" y="40" font-weight="600">Validation</text><text x="25" y="64" fill="#666" font-size="13">checks + citations</text></g><g transform="translate(810 190)"><rect width="155" height="92" rx="22" fill="#f6f6f2" stroke="#ddd"/><text x="25" y="40" font-weight="600">Human review</text><text x="25" y="64" fill="#666" font-size="13">approve / edit</text></g><path d="M225 236h30M410 236h30M595 236h30M780 236h30" stroke="#999" stroke-width="2" marker-end="url(#a)"/><g transform="translate(255 344)"><rect width="525" height="74" rx="22" fill="#fff" stroke="#ddd"/><text x="24" y="33" font-weight="600">Audit layer</text><text x="24" y="55" fill="#666" font-size="13">prompt logs · model version · source docs · user actions · approvals</text></g><path d="M520 282v62" stro